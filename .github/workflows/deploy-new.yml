name: Deploy

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'firebase/**'
      - '.github/workflows/deploy-new.yml'

env:
  VERCEL_PROJECT_NAME: gasith-rent-a-car

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ====================================
  # FRONTEND DEV → Vercel Preview
  # ====================================
  deploy-frontend-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
    env:
      WORKING_DIR: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm install

      - name: Create .env file from GitHub Secrets
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cat > .env << EOF
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_WHATSAPP_NUMBER=${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EOF

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel link \
            --yes \
            --project=${{ env.VERCEL_PROJECT_NAME }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment Info (Preview)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel pull \
            --yes \
            --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        working-directory: ${{ env.WORKING_DIR }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel deploy \
            --prebuilt \
            --target=preview \
            --token=${{ secrets.VERCEL_TOKEN }}

  # ====================================
  # BACKEND DEV → Firebase Cloud Functions (dev project)
  # ====================================
  deploy-functions-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Write backend .env
        working-directory: backend
        run: echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" > .env

      - name: Deploy Cloud Functions
        run: |
          npx firebase-tools deploy \
            --only functions \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive

  # ====================================
  # FRONTEND PROD → Vercel Production
  # ====================================
  deploy-frontend-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      WORKING_DIR: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm install

      - name: Create .env file from GitHub Secrets
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cat > .env << EOF
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_WHATSAPP_NUMBER=${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EOF

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel link \
            --yes \
            --project=${{ env.VERCEL_PROJECT_NAME }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment Info
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project (Production)
        working-directory: ${{ env.WORKING_DIR }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

  # ====================================
  # BACKEND PROD → Firebase Cloud Functions (production)
  # ====================================
  deploy-functions-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Write backend .env
        working-directory: backend
        run: echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" > .env

      - name: Deploy Cloud Functions
        run: |
          npx firebase-tools deploy \
            --only functions \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive
