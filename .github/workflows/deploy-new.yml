name: Deploy

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy-new.yml'

env:
  VERCEL_PROJECT_NAME: gasith-rent-a-car

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ====================================
  # FRONTEND DEV → Vercel Preview
  # ====================================
  deploy-frontend-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
    env:
      WORKING_DIR: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm install

      - name: Create .env file from GitHub Secrets
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cat > .env << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WHATSAPP_NUMBER=${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          EOF

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel link \
            --yes \
            --project=${{ env.VERCEL_PROJECT_NAME }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment Info (Preview)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel pull \
            --yes \
            --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        working-directory: ${{ env.WORKING_DIR }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel deploy \
            --prebuilt \
            --target=preview \
            --token=${{ secrets.VERCEL_TOKEN }}

  # ====================================
  # BACKEND DEV → Render (via Deploy Hook)
  # ====================================
  deploy-backend-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Trigger Render Deploy
        run: |
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Render deploy triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Render deploy trigger failed (HTTP $RESPONSE)"
            exit 1
          fi

  # ====================================
  # FRONTEND PROD → Vercel Production
  # ====================================
  deploy-frontend-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      WORKING_DIR: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm install

      - name: Create .env file from GitHub Secrets
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cat > .env << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WHATSAPP_NUMBER=${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          EOF

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel link \
            --yes \
            --project=${{ env.VERCEL_PROJECT_NAME }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment Info
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project (Production)
        working-directory: ${{ env.WORKING_DIR }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

  # ====================================
  # BACKEND PROD → Render (via Deploy Hook)
  # ====================================
  deploy-backend-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Render Deploy
        run: |
          echo "🚀 Triggering Render production deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Render deploy triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Render deploy trigger failed (HTTP $RESPONSE)"
            exit 1
          fi
