name: Keep Alive (Render)

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend health
        run: |
          echo "Pinging ${{ secrets.NEXT_PUBLIC_API_URL }}/health ..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "${{ secrets.NEXT_PUBLIC_API_URL }}/health" || echo "timeout")
          echo "HTTP $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "Backend is alive"
          else
            echo "Warning: backend returned $RESPONSE (cold start or waking up)"
          fi
